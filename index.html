<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graficación de linea</title>
    <style>
        body {
            background-color: #1e1e2e;
            font-family: Arial, sans-serif;
            color: #cdd6f4;
            margin: 0;
            padding: 20px;
        }
        canvas {
            border: 1px solid #585b70;
            background-color: #181825;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        input {
            width: 60px;
            margin: 5px;
        }

        /* Estilo de la tabla*/
        table {
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
        }
        thead tr {
            background-color: #cba6f7;
            color: #1e1e2e;
            text-align: center;
        }
        th {
            padding: 8px 14px;
        }
        td {
            text-align: center;
            padding: 5px 14px;
            color: #cdd6f4;
        }
        tbody tr:nth-child(even){
            background-color: #313244;
        }
        tbody tr:nth-child(odd){
            background-color: #1e1e2e;
        }
        tbody tr:hover {
            background-color: #45475a;
        }
        h3 {
            text-align: center;
            margin-bottom: 8px;
            color: #cba6f7;
        }
         /* Títulos principal */
        h1 {
            color: #cba6f7;
            font-size: 28px;
            margin-bottom: 5px;
        }
        /* subtitulos*/
        p {
            color: #a6adc8;
            font-size: 14px;
        }
        /* Botones */
        button {
            padding: 8px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        /* Botón Graficar */
        button:first-child {
            background-color: #cba6f7;
            color: #1e1e2e;
        }

        button:first-child:hover {
            background-color: #b48ee0;
        }

        /* Botón Limpiar */
        button:last-child {
            background-color: #f38ba8;
            color: #1e1e2e;
        }

        button:last-child:hover {
            background-color: #d97090;
        }





    </style>
</head>
<body>
    <div class="container">
        <h1>Graficación de linea</h1>
    </div>
    <div class="container">
        <p style="text-align:center; color:#555; font-size:14px;">
            Ingresa las coordenadas de dos puntos para trazar una línea usando el algoritmo de Bresenham.
        </p>
    </div>
    <div class="container">
        <div>
            <p>Punto A</p>
            <input type="number" id="x0" placeholder="X0">
            <input type="number" id="y0" placeholder="Y0">
        </div>
        <div>
            <p>Punto B</p>
            <input type="number" id="x1" placeholder="X1">
            <input type="number" id="y1" placeholder="Y1">
        </div>
    </div>
    
    <div class="container">
        <button onclick="dibujar()">Graficar</button>
        <button onclick="limpiar()">Limpiar</button>
    </div>
    
    <div class="container">
        <div>
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
    </div>
    <!-- Tabla que muestra paso a paso las variables del algoritmo, esto lo busque por internet para saber como se hacia entonces aqui voy explicando cada codigo que uso segun lo que entendi -->
     <div class="container">
        <div>
            <h3>Tabla de pasos</h3>
            <!-- 
                table  = Es el contenedor principal de la tabla
                thead  = Son los titulos
                tbody  = Es la sección de datos 
                th     = Es la celda de título 
                td     = Es la celda de dato 
            -->
            <table id="tablaBresenham" border="1" cellpadding="5" cellspacing="0">
                <thead>
                    <tr>
                        <th>Paso</th>
                        <th>x0</th>
                        <th>y0</th>
                        <th>dx</th>
                        <th>dy</th>
                        <th>sx</th>
                        <th>sy</th>
                        <th>err</th>
                        <th>e2</th>
                    </tr>
                </thead>
                <!-- tbody se rellena automáticamente desde agregarFilaTabla() en JS -->
                <tbody id="tablaBody">
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
