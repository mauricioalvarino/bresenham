<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graficación de linea</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid #000;
            background-color: #fff;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        input {
            width: 60px;
            margin: 5px;
        }

        /* Estilo de la tabla*/
        table {
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }
        thead tr {
            background-color: #333;
            color: #fff;
            text-align: center;
        }
        td {
            text-align: center;
            padding: 4px 10px;
        }
        tbody tr:nth-child(even){
            background-color: #ddd;
        }
        tbody tr:nth-child(odd){
            background-color: #fff;
        }
        tbody tr:hover {
            background-color: #aac4e0;
        }
        h3 {
            text-align: center;
            margin-bottom: 5px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Graficación de linea</h1>
    </div>
    <div class="container">
        <div>
            <p>Punto A</p>
            <input type="number" id="x0" placeholder="X0">
            <input type="number" id="y0" placeholder="Y0">
        </div>
        <div>
            <p>Punto B</p>
            <input type="number" id="x1" placeholder="X1">
            <input type="number" id="y1" placeholder="Y1">
        </div>
    </div>
    
    <div class="container">
        <button onclick="dibujar()">Graficar</button>
        <button onclick="limpiar()">Limpiar</button>
    </div>
    
    <div class="container">
        <div>
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
    </div>
    <!-- Tabla que muestra paso a paso las variables del algoritmo, esto lo busque por internet para saber como se hacia entonces aqui voy explicando cada codigo que uso segun lo que entendi -->
     <div class="container">
        <div>
            <h3>Tabla de pasos</h3>
            <!-- 
                table  = Es el contenedor principal de la tabla
                thead  = Son los titulos
                tbody  = Es la sección de datos 
                th     = Es la celda de título 
                td     = Es la celda de dato 
            -->
            <table id="tablaBresenham" border="1" cellpadding="5" cellspacing="0">
                <thead>
                    <tr>
                        <th>Paso</th>
                        <th>x0</th>
                        <th>y0</th>
                        <th>dx</th>
                        <th>dy</th>
                        <th>sx</th>
                        <th>sy</th>
                        <th>err</th>
                        <th>e2</th>
                    </tr>
                </thead>
                <!-- tbody se rellena automáticamente desde agregarFilaTabla() en JS -->
                <tbody id="tablaBody">
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
